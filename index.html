<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>デモ — 商用機械デジタルカルテ（社内限定）</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="gate" class="gate">
    <div class="gate-card">
      <p class="gate-label">Confidential Demo</p>
      <h1>商用機械デジタルカルテ</h1>
      <p class="gate-sub">Wanderlust Build 提案用デモ（社内管理画面イメージ）</p>
      <form id="gate-form">
        <label for="pw">パスワード</label>
        <input id="pw" type="password" autocomplete="current-password" placeholder="共有されたパスワード">
        <button type="button" id="gate-btn">表示する</button>
        <p id="gate-err" class="gate-err" hidden>パスワードが正しくありません</p>
      </form>
    </div>
  </div>

  <div id="app" class="app is-locked">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="#list">Machinery Karte <small>DEMO</small></a>
        <span class="badge">社内限定</span>
      </div>
    </header>

    <!-- LIST -->
    <main id="list-view" class="page" hidden>
      <h1 class="list-page-title" id="list-title">社内 商用機械一覧</h1>

      <section class="search-panel">
        <p class="search-panel-hd">条件で絞り込む</p>
        <div class="chip-row">
          <button type="button" class="chip-filter active" data-cat="">すべて</button>
          <button type="button" class="chip-filter" data-cat="new">新車</button>
          <button type="button" class="chip-filter" data-cat="used">中古</button>
          <button type="button" class="chip-filter" data-cat="repair">修理預り</button>
          <button type="button" class="chip-filter" data-cat="demo">デモ機</button>
        </div>
        <form id="search-form" class="search-form">
          <input type="hidden" id="f-category" value="">
          <label>メーカー
            <select id="f-maker">
              <option value="">すべて</option>
              <option>コマツ</option>
              <option>日立建機</option>
              <option>ヤンマー</option>
              <option>タダノ</option>
              <option>デンヨー</option>
              <option>Volvo</option>
              <option>ボマグ</option>
            </select>
          </label>
          <label>状態
            <select id="f-status">
              <option value="">すべて</option>
              <option>整備中（部品待ち）</option>
              <option>入庫済（販売前）</option>
              <option>販売可</option>
              <option>デモ稼働中</option>
              <option>部品調達中</option>
              <option>整備完了</option>
              <option>通関待ち</option>
              <option>保管中</option>
            </select>
          </label>
          <label>保管拠点
            <select id="f-location">
              <option value="">すべて</option>
              <option>千葉倉庫 Aヤード</option>
              <option>千葉倉庫 Bヤード</option>
              <option>千葉倉庫 Cヤード</option>
              <option>東京支店 展示場</option>
              <option>大阪倉庫</option>
              <option>横浜港 仮置き</option>
            </select>
          </label>
          <label class="grow">キーワード
            <input id="f-keyword" type="search" placeholder="管理No. / 型式 / キーワード">
          </label>
          <div class="search-actions">
            <button type="submit" class="btn primary">この条件で検索</button>
            <button type="button" class="btn" id="reset-btn">条件クリア</button>
          </div>
        </form>
      </section>

      <section class="result-panel">
        <div class="result-hd">
          <h2>検索結果一覧</h2>
          <p id="result-meta" class="result-meta"></p>
        </div>
        <div id="result-list" class="result-list"></div>
      </section>

      <footer class="demo-foot">
        <p>Wanderlust Build 提案デモ — 実在の機械・顧客データではありません</p>
        <p>参考UI: トラックバンク型 一覧 → 詳細カルテ</p>
      </footer>
    </main>

    <!-- DETAIL -->
    <main id="detail-view" class="page" hidden>
      <div id="detail-root"></div>
      <footer class="demo-foot">
        <p>Wanderlust Build 提案デモ — 実在の機械・顧客データではありません</p>
        <p>参考UI: トラックバンク型 一覧 → 詳細カルテ</p>
      </footer>
    </main>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
